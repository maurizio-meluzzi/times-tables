<html lang="it">
	<head>
		<title data-i18n="page.title.game">Welcome to TimesTables</title>
		<meta http-equiv="content-type" content="text/html; charset=utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<link rel="stylesheet" href="css/game.css">
	</head>

	<body>
		<div id="app-layout">
			<div id="app-left">
				<button type="button" id="btn-exit" data-i18n="game.exit">Esci</button>
				<div id="calc-box" class="app-box app-font"></div>
				<div id="res-box" class="app-box app-font"></div>
				<div id="time-counter-wrap">
					<div id="time-counter-1" class="time-counter">&nbsp;</div>
					<div id="time-counter-2" class="time-counter">&nbsp;</div>
					<div id="time-counter-3" class="time-counter">&nbsp;</div>
					<div id="time-counter-4" class="time-counter">&nbsp;</div>
					<div id="time-counter-5" class="time-counter">&nbsp;</div>
					<div id="time-counter-6" class="time-counter">&nbsp;</div>
					<div id="time-counter-7" class="time-counter">&nbsp;</div>
					<div id="time-counter-8" class="time-counter">&nbsp;</div>
					<div id="time-counter-9" class="time-counter">&nbsp;</div>
					<div id="time-counter-10" class="time-counter">&nbsp;</div>
				</div>
			</div>
			<div id="app-right">
				<button type="button" id="01" class="app-box app-font digit">1</button>
				<button type="button" id="02" class="app-box app-font digit">2</button>
				<button type="button" id="03" class="app-box app-font digit">3</button>
				<button type="button" id="04" class="app-box app-font digit">4</button>
				<button type="button" id="05" class="app-box app-font digit">5</button>
				<button type="button" id="06" class="app-box app-font digit">6</button>
				<button type="button" id="07" class="app-box app-font digit">7</button>
				<button type="button" id="08" class="app-box app-font digit">8</button>
				<button type="button" id="09" class="app-box app-font digit">9</button>
				<div class="keypad-spacer"></div>
				<button type="button" id="00" class="app-box app-font digit">0</button>
				<div class="keypad-spacer"></div>
			</div>
		</div>

		<div id="modal-ok">
			<div class="modal-inner">
				<div class="modal-img-wrap">
					<img src="imgs/ok.png" alt="">
				</div>
				<div class="modal-text-wrap">
					<div id="ok-row-01" data-i18n="game.correct">Ottimo!!</div>
					<div id="ok-row-02"></div>
				</div>
			</div>
		</div>

		<div id="modal-nok">
			<div class="modal-inner">
				<div class="modal-img-wrap">
					<img src="imgs/nok.png" alt="">
				</div>
				<div class="modal-text-wrap">
					<div id="nok-row-01" data-i18n="game.wrong">Mi dispiace...</div>
					<div id="nok-row-02"></div>
				</div>
			</div>
		</div>

		<div id="modal-time-ended">
			<div class="modal-inner">
				<div class="modal-img-wrap">
					<img src="imgs/nok.png" alt="">
				</div>
				<div class="modal-text-wrap">
					<div id="te-row-01" data-i18n="game.timeEnded">Tempo scaduto...</div>
					<div id="te-row-02"></div>
				</div>
			</div>
		</div>

	</body>

	<script type="module" src="js/main.js?v=2"></script>
</html>
